name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build:packages

      - name: Unit tests
        run: pnpm test

      - name: Smoke tests
        run: pnpm smoke

      - name: Web lint
        run: pnpm --filter web lint

      - name: Web build
        run: pnpm --filter web build
        env:
          AIOS_ENGINE_MODE: local

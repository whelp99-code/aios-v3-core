<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIOS v3 Workflow Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #1a1a2e; color: #e6e6e6; min-height: 100vh; }
    .header { background: linear-gradient(135deg, #0f3460, #16213e); padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #0f3460; }
    .header h1 { font-size: 24px; }
    .status { display: flex; align-items: center; gap: 8px; font-size: 14px; }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; }
    .online { background: #00ff88; box-shadow: 0 0 8px #00ff88; }
    .offline { background: #ff4444; box-shadow: 0 0 8px #ff4444; }
    .container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px; max-width: 1400px; margin: 0 auto; }
    .card { background: #16213e; border-radius: 12px; padding: 20px; border: 1px solid #0f3460; }
    .card h2 { font-size: 18px; margin-bottom: 15px; color: #00d4ff; }
    .full-width { grid-column: 1 / -1; }

    /* 워크플로우 리스트 */
    .workflow-list { display: flex; flex-direction: column; gap: 10px; max-height: 400px; overflow-y: auto; }
    .workflow-item { background: #1a1a2e; border: 1px solid #0f3460; border-radius: 8px; padding: 15px; cursor: pointer; transition: all 0.2s; }
    .workflow-item:hover { border-color: #00d4ff; transform: translateX(5px); }
    .workflow-item.active { border-color: #00ff88; background: #0f3460; }
    .workflow-name { font-size: 16px; font-weight: bold; margin-bottom: 5px; }
    .workflow-meta { font-size: 12px; color: #888; }
    .workflow-steps { font-size: 13px; color: #aaa; margin-top: 8px; }
    .workflow-actions { display: flex; gap: 8px; margin-top: 10px; }

    /* 버튼 */
    .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: bold; transition: all 0.2s; }
    .btn-primary { background: #0f3460; color: #fff; }
    .btn-primary:hover { background: #00d4ff; }
    .btn-success { background: #00ff88; color: #000; }
    .btn-success:hover { background: #00cc6a; }
    .btn-danger { background: #ff4444; color: #fff; }
    .btn-danger:hover { background: #cc0000; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }

    /* 입력 */
    input, textarea, select { width: 100%; padding: 12px; background: #1a1a2e; border: 1px solid #0f3460; border-radius: 6px; color: #e6e6e6; font-size: 14px; font-family: inherit; }
    input:focus, textarea:focus { outline: none; border-color: #00d4ff; }
    label { display: block; margin-bottom: 8px; font-size: 14px; color: #aaa; }
    .form-group { margin-bottom: 15px; }

    /* 결과 */
    .result-box { background: #1a1a2e; border: 1px solid #0f3460; border-radius: 8px; padding: 15px; font-family: 'Fira Code', monospace; font-size: 13px; white-space: pre-wrap; max-height: 300px; overflow-y: auto; }
    .result-success { border-color: #00ff88; }
    .result-error { border-color: #ff4444; }

    /* 상태 배지 */
    .badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
    .badge-success { background: #00ff88; color: #000; }
    .badge-error { background: #ff4444; color: #fff; }
    .badge-info { background: #00d4ff; color: #000; }

    /* 탭 */
    .tabs { display: flex; gap: 10px; margin-bottom: 15px; }
    .tab { padding: 8px 16px; border-radius: 6px; cursor: pointer; background: #1a1a2e; border: 1px solid #0f3460; }
    .tab.active { background: #0f3460; border-color: #00d4ff; }

    /* 실행 이력 */
    .history-item { padding: 10px; background: #1a1a2e; border-radius: 6px; margin-bottom: 8px; font-size: 13px; }
    .history-time { color: #888; font-size: 11px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🤖 AIOS v3 Workflow Dashboard</h1>
    <div class="status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">연결 확인 중...</span>
    </div>
  </div>

  <div class="container">
    <!-- 좌측: 워크플로우 리스트 -->
    <div class="card">
      <h2>📋 워크플로우 리스트</h2>
      <div class="tabs">
        <div class="tab active" onclick="filterWorkflows('all')">전체</div>
        <div class="tab" onclick="filterWorkflows('favorites')">⭐ 즐겨찾기</div>
        <div class="tab" onclick="filterWorkflows('recent')">🕐 최근 실행</div>
      </div>
      <div class="workflow-list" id="workflowList"></div>
      <button class="btn btn-primary" style="width:100%; margin-top:15px;" onclick="showCreateForm()">+ 새 워크플로우 만들기</button>
    </div>

    <!-- 우측: 워크플로우 상세/실행 -->
    <div class="card">
      <h2>▶️ 워크플로우 실행</h2>
      <div id="selectedWorkflow">
        <p style="color:#888; text-align:center; padding:40px;">← 워크플로우를 선택하세요</p>
      </div>
    </div>

    <!-- 하단: 실행 결과 -->
    <div class="card full-width">
      <h2>📊 실행 결과</h2>
      <div id="resultBox" class="result-box">
        <p style="color:#888;">워크플로우를 실행하면 결과가 여기에 표시됩니다.</p>
      </div>
    </div>

    <!-- 하단: 실행 이력 -->
    <div class="card full-width">
      <h2>🕐 실행 이력</h2>
      <div id="historyList">
        <p style="color:#888;">아직 실행 이력이 없습니다.</p>
      </div>
    </div>
  </div>

  <!-- 새 워크플로우 모달 -->
  <div id="createModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:100;">
    <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:#16213e; padding:30px; border-radius:12px; width:600px; max-height:80vh; overflow-y:auto;">
      <h2 style="margin-bottom:20px;">+ 새 워크플로우 만들기</h2>
      <div class="form-group">
        <label>워크플로우 이름</label>
        <input type="text" id="newName" placeholder="예: Sangfor 정책 점검">
      </div>
      <div class="form-group">
        <label>설명</label>
        <input type="text" id="newDescription" placeholder="예: Sangfor 장비 보안 정책 자동 점검">
      </div>
      <div class="form-group">
        <label>카테고리</label>
        <select id="newCategory">
          <option value="보안">보안</option>
          <option value="개발">개발</option>
          <option value="운영">운영</option>
          <option value="분석">분석</option>
          <option value="기타">기타</option>
        </select>
      </div>
      <div class="form-group">
        <label>스텝 (JSON 배열)</label>
        <textarea id="newSteps" rows="10" placeholder='[{"name": "1단계", "code": "return input;"}]'></textarea>
      </div>
      <div style="display:flex; gap:10px; justify-content:flex-end;">
        <button class="btn btn-primary" onclick="closeCreateForm()">취소</button>
        <button class="btn btn-success" onclick="saveWorkflow()">저장</button>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = window.AIOS_API_BASE || 'http://localhost:3201';
    let workflows = [];
    let selectedWorkflowId = null;
    let history = [];

    // 초기화
    async function init() {
      await checkHealth();
      await loadWorkflows();
      renderWorkflowList();
      setInterval(checkHealth, 5000);
    }

    // 헬스 체크
    async function checkHealth() {
      try {
        const res = await fetch(`${API_BASE}/api/health`);
        const data = await res.json();
        document.getElementById('statusDot').className = 'status-dot online';
        document.getElementById('statusText').textContent = `Online (${data.uptime?.toFixed(0)}s)`;
      } catch (e) {
        document.getElementById('statusDot').className = 'status-dot offline';
        document.getElementById('statusText').textContent = 'Offline';
      }
    }

    // 워크플로우 로드
    async function loadWorkflows() {
      try {
        const res = await fetch(`${API_BASE}/api/workflows`);
        workflows = await res.json();
      } catch (e) {
        // 기본 워크플로우 사용
        workflows = getDefaultWorkflows();
      }
    }

    // 기본 워크플로우
    function getDefaultWorkflows() {
      return [
        {
          id: 'wf-001',
          name: 'Sangfor 정책 점검',
          description: 'Sangfor 장비 보안 정책 자동 점검',
          category: '보안',
          favorite: true,
          steps: [
            { name: '정책 로드', code: "return { ...input, policies: [{id: 'POL-001', name: '비밀번호 정책', status: '준수'}, {id: 'POL-002', name: '방화벽 규칙', status: '위반'}, {id: 'POL-003', name: '접근 제어', status: '준수'}] }" },
            { name: '위반 분석', code: "const violations = input.policies.filter(p => p.status === '위반'); return { ...input, violations }" },
            { name: '리포트 생성', code: "return { total: input.policies.length, violations: input.violations.length, compliance: ((input.policies.length - input.violations.length) / input.policies.length * 100).toFixed(1) + '%' }" }
          ],
          lastRun: null,
          runCount: 0
        },
        {
          id: 'wf-002',
          name: '메일 분석',
          description: '이메일 내용 분석 및 요약',
          category: '분석',
          favorite: false,
          steps: [
            { name: '메일 읽기', code: "return { ...input, content: '重要 내용이 담긴 메일' }" },
            { name: '분석', code: "return { ...input, analysis: { priority: '높음', category: '업무' } }" },
            { name: '요약', code: "return { ...input, summary: '메일 내용 요약 완료' }" }
          ],
          lastRun: null,
          runCount: 0
        },
        {
          id: 'wf-003',
          name: '코드 리뷰',
          description: '코드 품질 자동 리뷰',
          category: '개발',
          favorite: true,
          steps: [
            { name: '코드 분석', code: "return { ...input, issues: ['보안 취약점', '성능 이슈'] }" },
            { name: '점수 계산', code: "return { ...input, score: 85 }" },
            { name: '리포트', code: "return { score: input.score, issues: input.issues, recommendation: '수정 권고' }" }
          ],
          lastRun: null,
          runCount: 0
        },
        {
          id: 'wf-004',
          name: '서버 모니터링',
          description: '서버 상태 실시간 모니터링',
          category: '운영',
          favorite: false,
          steps: [
            { name: 'CPU 체크', code: "return { ...input, cpu: { usage: 45, status: '정상' } }" },
            { name: '메모리 체크', code: "return { ...input, memory: { usage: 62, status: '정상' } }" },
            { name: '디스크 체크', code: "return { ...input, disk: { usage: 78, status: '주의' } }" },
            { name: '종합 리포트', code: "return { cpu: input.cpu, memory: input.memory, disk: input.disk, overall: '정상' }" }
          ],
          lastRun: null,
          runCount: 0
        }
      ];
    }

    // 워크플로우 리스트 렌더링
    function renderWorkflowList(filter = 'all') {
      const list = document.getElementById('workflowList');
      let filtered = workflows;

      if (filter === 'favorites') filtered = workflows.filter(w => w.favorite);
      if (filter === 'recent') filtered = [...workflows].sort((a, b) => (b.lastRun || 0) - (a.lastRun || 0));

      list.innerHTML = filtered.map(w => `
        <div class="workflow-item ${selectedWorkflowId === w.id ? 'active' : ''}" onclick="selectWorkflow('${w.id}')">
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <div class="workflow-name">${w.favorite ? '⭐' : ''} ${w.name}</div>
            <span class="badge badge-info">${w.category}</span>
          </div>
          <div class="workflow-meta">${w.description}</div>
          <div class="workflow-steps">스텝 ${w.steps.length}개 ${w.runCount > 0 ? `| 실행 ${w.runCount}회` : ''}</div>
          <div class="workflow-actions">
            <button class="btn btn-sm btn-primary" onclick="event.stopPropagation(); toggleFavorite('${w.id}')">
              ${w.favorite ? '★ 즐겨찾기 해제' : '☆ 즐겨찾기'}
            </button>
            <button class="btn btn-sm btn-danger" onclick="event.stopPropagation(); deleteWorkflow('${w.id}')">삭제</button>
          </div>
        </div>
      `).join('');
    }

    // 워크플로우 선택
    function selectWorkflow(id) {
      selectedWorkflowId = id;
      const w = workflows.find(w => w.id === id);
      if (!w) return;

      document.getElementById('selectedWorkflow').innerHTML = `
        <div style="margin-bottom:15px;">
          <h3>${w.name}</h3>
          <p style="color:#888; font-size:13px;">${w.description}</p>
          <span class="badge badge-info">${w.category}</span>
          ${w.lastRun ? `<span class="badge badge-success" style="margin-left:8px;">마지막 실행: ${new Date(w.lastRun).toLocaleString()}</span>` : ''}
        </div>
        <div style="margin-bottom:15px;">
          <label>입력 데이터 (JSON)</label>
          <textarea id="workflowInput" rows="3" placeholder='{"device": "EPP-10.80.1.106"}'>{}</textarea>
        </div>
        <div style="display:flex; gap:10px;">
          <button class="btn btn-success" onclick="executeWorkflow('${w.id}')">▶ 실행</button>
          <button class="btn btn-primary" onclick="editWorkflow('${w.id}')">✏️ 편집</button>
        </div>
        <div style="margin-top:15px;">
          <label>스텝 미리보기</label>
          <div class="result-box" style="font-size:12px;">
${w.steps.map((s, i) => `  ${i+1}. ${s.name}`).join('\n')}
          </div>
        </div>
      `;

      renderWorkflowList();
    }

    // 워크플로우 실행
    async function executeWorkflow(id) {
      const w = workflows.find(w => w.id === id);
      if (!w) return;

      let input = {};
      try {
        input = JSON.parse(document.getElementById('workflowInput').value || '{}');
      } catch (e) {
        input = {};
      }

      const resultBox = document.getElementById('resultBox');
      resultBox.className = 'result-box';
      resultBox.innerHTML = '⏳ 실행 중...';

      try {
        const res = await fetch(`${API_BASE}/api/workflow/execute`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: w.name, steps: w.steps, input })
        });
        const data = await res.json();

        resultBox.className = 'result-box result-success';
        resultBox.innerHTML = `<span class="badge badge-success">성공</span>\n\n` + JSON.stringify(data, null, 2);

        // 실행 이력 업데이트
        w.lastRun = Date.now();
        w.runCount = (w.runCount || 0) + 1;
        history.unshift({ workflow: w.name, time: Date.now(), success: true });
        renderHistory();
        renderWorkflowList();
      } catch (e) {
        resultBox.className = 'result-box result-error';
        resultBox.innerHTML = `<span class="badge badge-error">실패</span>\n\n` + e.message;
        history.unshift({ workflow: w.name, time: Date.now(), success: false });
        renderHistory();
      }
    }

    // 실행 이력 렌더링
    function renderHistory() {
      const list = document.getElementById('historyList');
      if (history.length === 0) {
        list.innerHTML = '<p style="color:#888;">아직 실행 이력이 없습니다.</p>';
        return;
      }
      list.innerHTML = history.slice(0, 10).map(h => `
        <div class="history-item">
          <span class="badge ${h.success ? 'badge-success' : 'badge-error'}">${h.success ? '성공' : '실패'}</span>
          <strong>${h.workflow}</strong>
          <span class="history-time">${new Date(h.time).toLocaleString()}</span>
        </div>
      `).join('');
    }

    // 필터 탭
    function filterWorkflows(filter) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      renderWorkflowList(filter);
    }

    // 즐겨찾기 토글
    function toggleFavorite(id) {
      const w = workflows.find(w => w.id === id);
      if (w) {
        w.favorite = !w.favorite;
        renderWorkflowList();
        selectWorkflow(id);
      }
    }

    // 워크플로우 삭제
    function deleteWorkflow(id) {
      if (!confirm('이 워크플로우를 삭제하시겠습니까?')) return;
      workflows = workflows.filter(w => w.id !== id);
      if (selectedWorkflowId === id) {
        selectedWorkflowId = null;
        document.getElementById('selectedWorkflow').innerHTML = '<p style="color:#888; text-align:center; padding:40px;">← 워크플로우를 선택하세요</p>';
      }
      renderWorkflowList();
    }

    // 새 워크플로우 폼
    function showCreateForm() {
      document.getElementById('createModal').style.display = 'block';
    }

    function closeCreateForm() {
      document.getElementById('createModal').style.display = 'none';
      document.getElementById('newName').value = '';
      document.getElementById('newDescription').value = '';
      document.getElementById('newSteps').value = '';
    }

    // 워크플로우 저장
    async function saveWorkflow() {
      const name = document.getElementById('newName').value.trim();
      const description = document.getElementById('newDescription').value.trim();
      const category = document.getElementById('newCategory').value;
      const stepsStr = document.getElementById('newSteps').value.trim();

      if (!name) { alert('이름을 입력하세요.'); return; }
      if (!stepsStr) { alert('스텝을 입력하세요.'); return; }

      let steps;
      try {
        steps = JSON.parse(stepsStr);
        if (!Array.isArray(steps)) throw new Error();
      } catch (e) {
        alert('스텝은 JSON 배열 형식이어야 합니다.');
        return;
      }

      const newWorkflow = {
        id: 'wf-' + Date.now(),
        name,
        description,
        category,
        favorite: false,
        steps,
        lastRun: null,
        runCount: 0
      };

      workflows.push(newWorkflow);
      closeCreateForm();
      renderWorkflowList();
      selectWorkflow(newWorkflow.id);
    }

    // 편집
    function editWorkflow(id) {
      const w = workflows.find(w => w.id === id);
      if (!w) return;
      document.getElementById('newName').value = w.name;
      document.getElementById('newDescription').value = w.description;
      document.getElementById('newCategory').value = w.category;
      document.getElementById('newSteps').value = JSON.stringify(w.steps, null, 2);
      document.getElementById('createModal').style.display = 'block';
      workflows = workflows.filter(wf => wf.id !== id);
    }

    // 시작
    init();
  </script>
</body>
</html>
